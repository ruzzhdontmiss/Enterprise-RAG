services:
  # 1. FastAPI backend web service
  - type: web
    name: enterprise-rag-backend
    runtime: python
    plan: free
    buildCommand: "cd backend && pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -e . && pip show torch"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-rag-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: MISTRAL_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ENABLE_RERANKER
        value: "false"
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: enterprise-rag-frontend
          property: url

  # 2. Next.js frontend web service
  - type: web
    name: enterprise-rag-frontend
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npx next start -p $PORT"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: enterprise-rag-backend
          property: url

databases:
  # Managed PostgreSQL DB
  - name: enterprise-rag-db
    plan: free
